<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Scout Adventure - CYOA</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0a1628;
  color:#222;
}

/* screens */
.screen { display:none; }
.active { display:block; }

/* cover */
.cover {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  background:linear-gradient(#0a1628,#1a3a6e);
  padding:40px;
}

h1 { font-size:42px; }

/* story */
.story {
  max-width:900px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:20px;
}

.text {
  font-size:20px;
  line-height:1.8;
}

/* buttons */
button {
  display:block;
  width:100%;
  margin-top:12px;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* dialogue */
.dialogue {
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
}
.zara { background:#fff4e6; }
.leo { background:#eef4ff; }

/* canvas */
canvas {
  width:100%;
  height:300px;
}
</style>
</head>

<body>

<!-- STANDARDS -->
<div id="standards" class="cover active">
  <h1>Cloud Scout Adventure</h1>

  <h2>Educational Standards (Grade 3)</h2>

  <p><b>NGSS 3-ESS2-1:</b> Represent data to describe weather conditions.</p>
  <p><b>Science Practice:</b> Observing patterns in weather.</p>

  <button onclick="start()">Start Adventure</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

<canvas id="sky"></canvas>

<div class="story">
  <div id="text" class="text"></div>
  <div id="choices"></div>
</div>

</div>

<script>

function start(){
  document.getElementById("standards").classList.remove("active");
  document.getElementById("game").classList.add("active");
  scene(0);
}

/* SCENES */
const scenes = [

/* 0 START */
{
text:`
The class arrives at the lake.

<div class="dialogue leo">“What are those clouds?”</div>

Thin white clouds stretch across the sky.

What type are they?
`,
choices:[
{t:"Cirrus (thin & high)", n:1},
{t:"Cumulus (puffy)", n:2},
{t:"Stratus (flat gray)", n:3}
]
},

/* CORRECT PATH */
{
text:`
Correct! Cirrus clouds.

<div class="dialogue zara">“They mean weather might change later…”</div>

Later, clouds grow bigger and darker.

What should you do?
`,
choices:[
{t:"Go inside now", n:4},
{t:"Wait and observe more", n:5},
{t:"Ignore and play", n:6}
]
},

/* WRONG PATH 1 */
{
text:`Those are not cumulus.

Try again — look carefully at shape.`,
choices:[
{t:"Try again", n:0}
]
},

/* WRONG PATH 2 */
{
text:`Not stratus — the sky is still blue.

Try again.`,
choices:[
{t:"Go back", n:0}
]
},

/* HERO PATH */
{
text:`
You go inside early.

BOOM! Thunder starts.

<div class="dialogue leo">“You saved us!”</div>

⭐ BEST ENDING
`,
choices:[]
},

/* THINKING PATH */
{
text:`
You observe more.

Clouds grow taller and darker.

Now what?
`,
choices:[
{t:"Go inside now", n:4},
{t:"Wait longer", n:6}
]
},

/* RISKY PATH */
{
text:`
You stayed outside.

Suddenly—

RAIN pours heavily.

<div class="dialogue zara">“I should have acted sooner.”</div>

🌧 Learning ending
`,
choices:[]
}

];

/* ENGINE */
function scene(i){
  const s = scenes[i];
  document.getElementById("text").innerHTML = s.text;

  const c = document.getElementById("choices");
  c.innerHTML="";

  s.choices.forEach(choice=>{
    const b=document.createElement("button");
    b.innerText=choice.t;
    b.onclick=()=>scene(choice.n);
    c.appendChild(b);
  });

  drawSky(i);
}

/* SKY */
function drawSky(i){
  const canvas=document.getElementById("sky");
  const ctx=canvas.getContext("2d");

  canvas.width=window.innerWidth;
  canvas.height=300;

  const colors=[
    ["#0d2755","#7ab8e8"],
    ["#1a4a8a","#7abbea"],
    ["#555","#aaa"],
    ["#666","#bbb"],
    ["#111","#333"],
    ["#333","#777"],
    ["#222","#444"]
  ];

  const g=ctx.createLinearGradient(0,0,0,300);
  colors[i].forEach((c,idx)=>g.addColorStop(idx,c));

  ctx.fillStyle=g;
  ctx.fillRect(0,0,canvas.width,300);
}

</script>

</body>
</html>
